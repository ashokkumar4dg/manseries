<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account | Man Series</title>
  <link rel="icon" type="image/png" href="Product Images/fav icon/favicon.png?v=2">
  <link rel="stylesheet" href="style.css">
  <style>
    .account-page-wrapper {
      padding: 10rem 0 6rem;
      min-height: 80vh;
      background: var(--cream);
    }
    
    /* --- AUTH SECTION --- */
    .auth-wrapper {
      max-width: 440px;
      margin: 0 auto;
      padding: 4rem 3rem;
      background: var(--warm-white);
      border: 1px solid var(--border-warm);
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.04);
      text-align: center;
      animation: fadeUp 0.5s ease-out;
    }
    .auth-wrapper h2 {
      font-family: var(--font-display);
      font-size: 3rem;
      color: var(--charcoal);
      margin-bottom: 0.5rem;
      line-height: 1.1;
    }
    .auth-wrapper p {
      color: var(--muted);
      margin-bottom: 2.5rem;
      font-size: 0.95rem;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      text-align: left;
    }
    
    /* --- DASHBOARD SECTION --- */
    .account-page-header {
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--border-warm);
      padding-bottom: 1rem;
      animation: fadeUp 0.5s ease-out;
    }
    .account-page-header h1 {
      font-family: var(--font-display);
      font-size: 3rem;
      color: var(--charcoal);
      letter-spacing: -1px;
    }
    
    .account-grid {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 3rem;
      animation: fadeUp 0.6s ease-out;
    }
    
    .account-sidebar {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .account-nav-btn {
      background: transparent;
      border: none;
      text-align: left;
      padding: 1.2rem 1.5rem;
      border-radius: 16px;
      font-family: var(--font-heading);
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--muted);
      cursor: pointer;
      transition: var(--transition-smooth);
    }
    .account-nav-btn:hover {
      background: rgba(0,0,0,0.03);
      color: var(--charcoal);
      padding-left: 1.8rem;
    }
    .account-nav-btn.active {
      background: var(--warm-white);
      color: var(--charcoal);
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
      border: 1px solid var(--border-warm);
    }
    
    .account-content {
      background: var(--warm-white);
      border: 1px solid var(--border-warm);
      border-radius: 32px;
      padding: 4rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.02);
    }
    .account-content h2 {
      font-size: 2rem;
      color: var(--charcoal);
      margin-bottom: 2.5rem;
      font-family: var(--font-display);
    }
    
    /* --- SHARED FORM STYLES --- */
    .profile-form {
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
      max-width: 500px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .form-group label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .form-group input {
      padding: 1.2rem 1.5rem;
      border: 1px solid var(--border-warm);
      border-radius: 16px;
      background: var(--cream);
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--charcoal);
      transition: var(--transition-smooth);
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--sage);
      box-shadow: 0 0 0 4px var(--sage-alpha);
      background: #fff;
    }
    
    .save-btn {
      padding: 1.2rem 2.5rem;
      background: var(--charcoal);
      color: var(--warm-white);
      border: none;
      border-radius: 100px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      align-self: flex-start;
      margin-top: 1rem;
      transition: var(--transition-spring);
      width: 100%;
    }
    .account-content .save-btn {
      width: auto;
    }
    .save-btn:hover {
      background: var(--ink);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @media (max-width: 768px) {
      .account-page-wrapper { padding: 6rem 0 3rem; }
      .account-content { padding: 2rem; border-radius: 24px; }
      .auth-wrapper { padding: 3rem 1.5rem; border-radius: 24px; box-shadow: none; border: none; background: transparent; }
      .account-grid { grid-template-columns: 1fr; gap: 2rem; }
      .account-sidebar { flex-direction: row; overflow-x: auto; padding-bottom: 0.5rem; scrollbar-width: none; }
      .account-sidebar::-webkit-scrollbar { display: none; }
      .account-nav-btn { white-space: nowrap; padding: 0.8rem 1.2rem; }
      .account-nav-btn:hover { padding-left: 1.2rem; }
    }
  </style>
</head>

<body>
  <!-- Navigation -->
  <header class="navbar navbar-light-page" id="navbar">
    <div class="container navbar-container">
      <a href="index.html" class="logo" aria-label="Man Series Home">
        <img src="Product Images/Logo/Wordmark Logo.png" alt="Man Series" class="logo-img">
      </a>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="series.html">Series</a></li>
          <li><a href="byos.html">B.Y.O.S.</a></li>
          <li><a href="about.html">About</a></li>
        </ul>
      </nav>
      <div class="nav-actions">
        <a href="account.html" class="cart-trigger" aria-label="My Account" style="margin-right: 5px;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </a>
        <button class="cart-trigger" id="cartTrigger" aria-label="Open Cart">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span class="cart-count" id="cartBadgeCount">0</span>
        </button>
        <a href="series.html" class="btn btn-primary" style="padding: 0.55rem 1.3rem; font-size: 0.8rem;">Shop Now</a>
      </div>
    </div>
  </header>

  <main class="account-page-wrapper">
    <div class="container">
      
      <!-- LOGIN / SIGN UP SECTION -->
      <div id="loginSection" class="auth-wrapper">
        <h2>Welcome Back.</h2>
        <p>Enter your details to access your routine.</p>
        
        <form class="auth-form" onsubmit="event.preventDefault(); simulateLogin();">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="save-btn">Sign In</button>
        </form>
        
        <p style="margin-top: 2rem; font-size: 0.85rem;">Don't have an account? <a href="#" style="color: var(--charcoal); font-weight: 700;">Create one</a></p>
      </div>

      <!-- ACCOUNT DASHBOARD SECTION -->
      <div id="accountSection" style="display: none;">
        <div class="account-page-header">
          <h1 style="font-size: 3.5rem; letter-spacing: -2px; margin-bottom: 1rem; line-height: 1;">
            <span class="line-normal">Manage Your</span>
            <span class="line-italic">Account.</span>
          </h1>
        </div>
        
        <div class="account-grid">
          <div class="account-sidebar">
            <button class="account-nav-btn active">Profile Settings</button>
            <button class="account-nav-btn">Order History</button>
            <button class="account-nav-btn">Saved Addresses</button>
            <button class="account-nav-btn" style="color: #ef4444; margin-top: auto;" onclick="simulateLogout()">Sign Out</button>
          </div>
          
          <div class="account-content">
            <h2>Profile Settings</h2>
            <div class="profile-form">
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" value="Indian Man">
              </div>
              <div class="form-group">
                <label>Email Address</label>
                <input type="email" value="user@example.com">
              </div>
              <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" value="+91 98765 43210">
              </div>
              <button class="save-btn" onclick="alert('Profile Updated Successfully!')">Save Changes</button>
            </div>
          </div>
        </div>
      </div>
      
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    // Authentication State Simulation
    function simulateLogin() {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('accountSection').style.display = 'block';
    }
    
    function simulateLogout() {
      document.getElementById('accountSection').style.display = 'none';
      document.getElementById('loginSection').style.display = 'block';
    }
  </script>
</body>
</html>
