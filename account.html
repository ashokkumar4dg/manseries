<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account | Man Series</title>
  <link rel="icon" type="image/png" href="Product Images/fav icon/favicon.png?v=2">
  <script>
    // Anti-flicker script to prevent login flash when already logged in
    if (localStorage.getItem('isLoggedIn') === 'true') {
      document.documentElement.classList.add('is-logged-in');
    }
  </script>
  <link rel="stylesheet" href="style.css">
  <style>
    .account-page-wrapper {
      padding: 8rem 0 4rem;
      min-height: 100vh;
      background: var(--cream);
      display: flex;
      flex-direction: column;
    }
    .account-page-wrapper .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    /* --- AUTH SECTION --- */
    .auth-wrapper {
      max-width: 380px;
      margin: 0 auto;
      width: 100%;
      text-align: center;
      animation: fadeUp 0.5s ease-out;
    }
    .auth-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .auth-wrapper h2 {
      font-family: var(--font-display);
      font-size: 1.8rem;
      color: var(--charcoal);
      margin-bottom: 0.3rem;
      line-height: 1.2;
    }
    .auth-wrapper p {
      color: var(--charcoal);
      margin-bottom: 2.5rem;
      font-size: 1rem;
      opacity: 0.8;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .input-with-icon {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-with-icon svg {
      position: absolute;
      left: 1.2rem;
      color: #6a7c6f;
      width: 18px;
      height: 18px;
    }
    .input-with-icon input {
      width: 100%;
      padding: 1.1rem 1.2rem 1.1rem 3.2rem;
      background: #e8ede6; /* Light sage grey */
      border: 1px solid transparent;
      border-radius: 12px;
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--charcoal);
      transition: var(--transition-smooth);
    }
    .input-with-icon input:focus {
      outline: none;
      border-color: var(--sage);
      background: #fff;
    }
    .input-with-icon input::placeholder {
      color: #8a9c8f;
    }
    
    .sage-btn {
      background: #6c8071;
      color: #fff;
      padding: 1.2rem;
      border-radius: 100px;
      border: none;
      font-size: 1.05rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: all 0.3s ease;
      width: 100%;
    }
    .sage-btn:hover {
      background: #5a6b5e;
      transform: translateY(-2px);
    }
    
    .auth-divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 1.8rem 0 1.5rem;
      color: #8a9c8f;
      font-size: 0.9rem;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #d0dad3;
    }
    .auth-divider span {
      padding: 0 15px;
    }
    
    .social-login {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }
    .social-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: transparent;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--charcoal);
      transition: transform 0.3s;
    }
    .social-btn:hover {
      transform: scale(1.1);
    }
    .social-btn svg {
      width: 26px;
      height: 26px;
      fill: currentColor;
    }
    
    .auth-footer-text {
      font-size: 0.95rem;
      color: var(--charcoal);
    }
    .auth-footer-text a {
      color: var(--charcoal);
      font-weight: 600;
      text-decoration: underline;
      text-decoration-color: #a8c5b5;
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
    }
    
    body.auth-page-active #navbar {
      display: none !important;
    }
    body.auth-page-active .account-page-wrapper {
      padding-top: 0 !important;
    }
    
    html.is-logged-in #navbar {
      display: flex !important;
    }
    html.is-logged-in .account-page-wrapper {
      padding-top: 10rem !important;
    }
    html.is-logged-in #loginSection {
      display: none !important;
    }
    html.is-logged-in #accountSection {
      display: block !important;
    }
    
    /* --- DASHBOARD SECTION --- */
    .account-page-header {
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--border-warm);
      padding-bottom: 1rem;
      animation: fadeUp 0.5s ease-out;
    }
    .account-page-header h1 {
      font-family: var(--font-display);
      font-size: 3rem;
      color: var(--charcoal);
      letter-spacing: -1px;
    }
    
    .account-grid {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 3rem;
      animation: fadeUp 0.6s ease-out;
    }
    
    .account-sidebar {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .account-nav-btn {
      background: transparent;
      border: none;
      text-align: left;
      padding: 1.2rem 1.5rem;
      border-radius: 16px;
      font-family: var(--font-heading);
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--muted);
      cursor: pointer;
      transition: var(--transition-smooth);
    }
    .account-nav-btn:hover {
      background: rgba(0,0,0,0.03);
      color: var(--charcoal);
      padding-left: 1.8rem;
    }
    .account-nav-btn.active {
      background: var(--warm-white);
      color: var(--charcoal);
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
      border: 1px solid var(--border-warm);
    }
    
    .account-content {
      background: var(--warm-white);
      border: 1px solid var(--border-warm);
      border-radius: 32px;
      padding: 4rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.02);
    }
    .account-content h2 {
      font-size: 2rem;
      color: var(--charcoal);
      margin-bottom: 2.5rem;
      font-family: var(--font-display);
    }
    
    /* --- SHARED FORM STYLES --- */
    .profile-form {
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
      max-width: 500px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .form-group label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .form-group input {
      padding: 1.2rem 1.5rem;
      border: 1px solid var(--border-warm);
      border-radius: 16px;
      background: var(--cream);
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--charcoal);
      transition: var(--transition-smooth);
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--sage);
      box-shadow: 0 0 0 4px var(--sage-alpha);
      background: #fff;
    }
    
    .save-btn {
      padding: 1.2rem 2.5rem;
      background: var(--charcoal);
      color: var(--warm-white);
      border: none;
      border-radius: 100px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      align-self: flex-start;
      margin-top: 1rem;
      transition: var(--transition-spring);
      width: 100%;
    }
    .account-content .save-btn {
      width: auto;
    }
    .save-btn:hover {
      background: var(--ink);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @media (max-width: 768px) {
      .account-page-wrapper { padding: 5rem 0 3rem; }
      .account-content { padding: 2rem; border-radius: 24px; }
      .auth-wrapper { padding: 2rem 1.5rem 0; border-radius: 24px; box-shadow: none; border: none; background: transparent; }
      .auth-wrapper h2 { font-size: 2.2rem; margin-bottom: 0.2rem; }
      .auth-wrapper p { font-size: 0.9rem; margin-bottom: 1.5rem; }
      .auth-form { gap: 1rem; }
      .form-group input { padding: 1rem 1.2rem; font-size: 0.95rem; }
      .save-btn { padding: 1rem 2rem; font-size: 0.95rem; }
      .account-grid { grid-template-columns: 1fr; gap: 2rem; }
      .account-sidebar { flex-direction: row; flex-wrap: wrap; overflow-x: visible; padding-bottom: 0.5rem; }
      .account-nav-btn { white-space: nowrap; padding: 0.8rem 1.2rem; }
      .account-nav-btn:hover { padding-left: 1.2rem; }
    }
  </style>
</head>

  <script src="app.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
      if (isLoggedIn) {
        document.body.classList.remove('auth-page-active');
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('accountSection').style.display = 'block';
      }
    });

    // Login Validation
    function validateAndLogin() {
      const loginId = document.getElementById('loginId').value.trim();
      const password = document.getElementById('loginPassword').value;

      // Check if it's a number (Phone login)
      const isNumber = /^\d+$/.test(loginId);
      
      if (isNumber) {
        if (loginId.length !== 10) {
          alert("Phone number must be exactly 10 digits.");
          return;
        }
      } else {
        // Treat as email, must be @gmail.com
        if (!loginId.toLowerCase().endsWith("@gmail.com")) {
          alert("Only @gmail.com emails are allowed.");
          return;
        }
      }

      // Check password: At least 1 uppercase, 1 lowercase, 1 number, 1 symbol
      const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).+$/;
      if (!passwordRegex.test(password)) {
        alert("Password must contain at least one uppercase letter, one lowercase letter, one number, and one symbol.");
        return;
      }

      // If validation passes, simulate login
      simulateLogin();
    }

    // Authentication State Simulation
    function simulateLogin() {
      localStorage.setItem('isLoggedIn', 'true');
      
      const urlParams = new URLSearchParams(window.location.search);
      const redirect = urlParams.get('redirect');
      if (redirect === 'cart') {
        window.location.href = 'cart.html';
        return;
      }
      
      document.body.classList.remove('auth-page-active');
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('accountSection').style.display = 'block';
      window.scrollTo(0,0);
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const tab = urlParams.get('tab');
      if (tab) {
        switchTab(tab);
      }
    });

    // Tab Switching Logic
    function switchTab(tabId) {
      document.querySelectorAll('.dashboard-tab').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.account-nav-btn').forEach(el => el.classList.remove('active'));
      
      const targetTab = document.getElementById('tab-' + tabId);
      const targetBtn = document.getElementById('btn-tab-' + tabId);
      
      if (targetTab) targetTab.style.display = 'block';
      if (targetBtn) targetBtn.classList.add('active');

      if (tabId === 'orders') {
        renderOrderHistory();
      }
    }

    // Render Order History
    function renderOrderHistory() {
      const list = document.getElementById('orderHistoryList');
      const history = JSON.parse(localStorage.getItem('orderHistory')) || [];
      
      if (history.length === 0) {
        list.innerHTML = '<p style="color: var(--muted);">You haven\\'t placed any orders yet.</p>';
        return;
      }

      let html = '';
      history.forEach(order => {
        let itemsHtml = order.items.map(item => `${item.qty}x ${item.name}`).join(', ');
        html += `
          <div style="border: 1px solid var(--border-warm); padding: 1.5rem; border-radius: 16px; margin-bottom: 1.5rem; background: #fff;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; border-bottom: 1px solid var(--border-warm); padding-bottom: 1rem;">
              <div>
                <strong style="color: var(--charcoal); display: block; margin-bottom: 0.3rem;">Order ID: ${order.id}</strong>
                <span style="font-size: 0.85rem; color: var(--muted);">${order.date}</span>
              </div>
              <div style="text-align: right;">
                <strong style="color: var(--charcoal); font-size: 1.2rem; display: block;">₹${order.total}</strong>
                <span style="display: inline-block; padding: 0.2rem 0.6rem; background: #e8f5e9; color: #4caf50; font-size: 0.75rem; border-radius: 100px; font-weight: 600; margin-top: 0.3rem;">Paid</span>
              </div>
            </div>
            <div style="font-size: 0.95rem; color: var(--charcoal); line-height: 1.5;">
              <strong style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted);">Items:</strong><br>
              ${itemsHtml}
            </div>
          </div>
        `;
      });
      list.innerHTML = html;
    }

    function simulateLogout() {
      localStorage.removeItem('isLoggedIn');
      document.documentElement.classList.remove('is-logged-in');
      document.body.classList.add('auth-page-active');
      document.getElementById('accountSection').style.display = 'none';
      document.getElementById('loginSection').style.display = 'block';
      window.scrollTo(0,0);
    }
  </script>
</body>
</html>
