<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Routine | Man Series</title>
  <link rel="icon" type="image/png" href="Product Images/fav icon/favicon.png?v=2">
  <link rel="stylesheet" href="style.css">
  <style>
    .cart-page-wrapper {
      padding: 10rem 0 6rem;
      min-height: 80vh;
      background: var(--cream);
    }
    .cart-page-header {
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--border-warm);
      padding-bottom: 1rem;
    }
    .cart-page-header h1 {
      font-family: var(--font-display);
      font-size: 3rem;
      color: var(--charcoal);
      letter-spacing: -1px;
    }
    .cart-page-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 4rem;
    }
    .cart-page-items {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .cart-page-item {
      display: flex;
      align-items: center;
      gap: 2rem;
      background: var(--warm-white);
      padding: 1.5rem;
      border-radius: 20px;
      border: 1px solid var(--border-warm);
      box-shadow: var(--shadow-subtle);
    }
    .cart-page-item-img {
      width: 100px;
      height: 100px;
      background: var(--cream);
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .cart-page-item-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: scale(1.4);
    }
    .cart-page-item-details {
      flex: 1;
    }
    .cart-page-item-details h3 {
      font-size: 1.2rem;
      color: var(--charcoal);
      margin-bottom: 0.3rem;
    }
    .cart-page-item-details p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .cart-page-qty-ctrl {
      display: inline-flex;
      align-items: center;
      background: var(--cream);
      border-radius: 100px;
      border: 1px solid var(--border-warm);
      overflow: hidden;
    }
    .cart-page-qty-ctrl button {
      background: none;
      border: none;
      width: 32px;
      height: 32px;
      cursor: pointer;
      color: var(--charcoal);
      font-weight: 600;
    }
    .cart-page-qty-ctrl button:hover {
      background: rgba(0,0,0,0.05);
    }
    .cart-page-qty-ctrl span {
      width: 30px;
      text-align: center;
      font-weight: 600;
      color: var(--charcoal);
    }
    .cart-page-item-price {
      font-family: var(--font-heading);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--charcoal);
    }
    
    .cart-page-summary {
      background: var(--warm-white);
      border: 1px solid var(--border-warm);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: var(--shadow-hover);
      height: max-content;
      position: sticky;
      top: 120px;
    }
    .cart-page-summary h3 {
      font-size: 1.4rem;
      color: var(--charcoal);
      margin-bottom: 1.5rem;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      color: var(--muted);
    }
    .summary-row.total {
      border-top: 1px solid var(--border-warm);
      padding-top: 1rem;
      margin-top: 1rem;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--charcoal);
    }
    .checkout-btn-large {
      width: 100%;
      padding: 1.2rem;
      background: var(--charcoal);
      color: var(--warm-white);
      border: none;
      border-radius: 100px;
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition-spring);
      margin-top: 1.5rem;
    }
    .checkout-btn-large:hover {
      background: var(--ink);
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    
    .empty-cart-view {
      text-align: center;
      padding: 4rem 0;
    }
    .empty-cart-view h2 {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--charcoal);
      margin-bottom: 1rem;
    }
    
    @media (max-width: 900px) {
      .cart-page-header h1 {
        font-size: 2.5rem !important;
      }
      .nav-actions .btn-primary {
        display: none !important;
      }

      .cart-page-grid { grid-template-columns: 1fr; }
      .cart-page-summary { position: static; }
      .cart-page-item { flex-direction: column; text-align: center; gap: 1rem; }
    }
  </style>
</head>

<body>
  <!-- Navigation -->
  <header class="navbar navbar-light-page" id="navbar">
    <div class="container navbar-container">
      <div class="nav-brand">
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open Menu">
          <svg class="icon-menu" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
          <svg class="icon-close" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
        <a href="index.html" class="logo" aria-label="Man Series Home">
          <img src="Product Images/Logo/Wordmark Logo.png" alt="Man Series" class="logo-img">
        </a>
      </div>
      <nav class="nav-menu" id="navMenu">
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="series.html">Series</a></li>
          <li><a href="byos.html">B.Y.O.S.</a></li>
          <li><a href="about.html">About</a></li>
        </ul>
      </nav>
      <div class="nav-actions">
        <a href="account.html" class="cart-trigger" aria-label="My Account" style="margin-right: 5px;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </a>
        <button class="cart-trigger" id="cartTrigger" aria-label="Open Cart" style="display:none;">
          <!-- Hidden on cart page, but logic relies on it -->
        </button>
        <a href="series.html" class="btn btn-primary hide-on-mobile" style="padding: 0.55rem 1.3rem; font-size: 0.8rem;">Shop Now</a>
      </div>
    </div>
  </header>

  <main class="cart-page-wrapper">
    <div class="container">
      <div class="cart-page-header">
        <h1 style="font-size: 3.5rem; letter-spacing: -2px; margin-bottom: 1rem; line-height: 1;">
          <span class="line-normal">Review Your</span>
          <span class="line-italic">Active Routine.</span>
        </h1>
      </div>
      
      <div class="cart-page-grid" id="cartPageGrid">
        <div class="cart-page-items" id="cartPageItems">
          <!-- Items injected here -->
        </div>
        
        <div class="cart-page-summary">
          <h3>Order Summary</h3>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="cpSubtotal">₹0</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span id="cpShipping">₹0</span>
          </div>

          <div class="summary-row total">
            <span>Total</span>
            <span id="cpTotal">₹0</span>
          </div>
          <button class="checkout-btn-large" id="cpCheckoutBtn">Proceed to Checkout</button>
        </div>
      </div>
      
      <div class="empty-cart-view" id="emptyCartView" style="display: none;">
        <h2>Your routine is empty</h2>
        <p style="color: var(--muted); margin-bottom: 2rem;">Discover the perfect active skincare for your needs.</p>
        <a href="series.html" class="btn btn-primary">Explore The Series</a>
      </div>
      
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const renderCartPage = () => {
        const localCart = JSON.parse(localStorage.getItem('cart')) || [];
        const itemsContainer = document.getElementById('cartPageItems');
        const grid = document.getElementById('cartPageGrid');
        const emptyView = document.getElementById('emptyCartView');
        
        if (localCart.length === 0) {
          grid.style.display = 'none';
          emptyView.style.display = 'block';
          return;
        }
        
        grid.style.display = 'grid';
        emptyView.style.display = 'none';
        itemsContainer.innerHTML = '';
        
        let subtotal = 0;
        
        localCart.forEach(item => {
          subtotal += item.price * item.qty;
          
          let imgSrc = '';
          if (item.img === 'fw') imgSrc = 'Product Images/Face wash/Transparent_Facewash.png?v=3';
          else if (item.img === 'sr') imgSrc = 'Product Images/Serum/Transparent_Serum.png?v=3';
          else if (item.img === 'ss') imgSrc = 'Product Images/Sunscreen/Transparent_Sunscreen.png?v=3';
          
          const div = document.createElement('div');
          div.className = 'cart-page-item';
          div.innerHTML = `
            <div class="cart-page-item-img">
              <img src="${imgSrc}" alt="${item.name}">
            </div>
            <div class="cart-page-item-details">
              <h3>${item.name}</h3>
              <p>₹${item.price} · Dermatologically Tested Active Formula</p>
              <div class="cart-page-qty-ctrl">
                <button onclick="updateCartItem('${item.id}', -1)">−</button>
                <span>${item.qty}</span>
                <button onclick="updateCartItem('${item.id}', 1)">+</button>
              </div>
            </div>
            <div class="cart-page-item-price">₹${item.price * item.qty}</div>
          `;
          itemsContainer.appendChild(div);
        });
        
        const shipping = subtotal >= 499 ? 0 : 50;
        const total = subtotal + shipping;
        
        document.getElementById('cpSubtotal').textContent = `₹${subtotal}`;
        document.getElementById('cpShipping').textContent = shipping === 0 ? 'Free' : `₹${shipping}`;
        document.getElementById('cpTotal').textContent = `₹${total}`;
      };
      
      window.updateCartItem = (id, delta) => {
        let localCart = JSON.parse(localStorage.getItem('cart')) || [];
        const product = localCart.find(i => i.id === id);
        if (product) {
          product.qty += delta;
          if (product.qty <= 0) {
            localCart = localCart.filter(i => i.id !== id);
          }
          localStorage.setItem('cart', JSON.stringify(localCart));
          // Refresh the page or re-render
          renderCartPage();
          // Also update badge via app.js global state
          const evt = new Event('cartUpdated');
          window.dispatchEvent(evt);
        }
      };
      
      window.addEventListener('cartUpdated', () => {
         // Reload app.js state if needed, simplest is just reload
         window.location.reload();
      });

      document.getElementById('cpCheckoutBtn').addEventListener('click', () => {
        const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
        if (isLoggedIn) {
          window.location.href = 'payment.html';
        } else {
          window.location.href = 'account.html?redirect=cart';
        }
      });
      
      renderCartPage();
    });
  </script>
</body>
</html>
