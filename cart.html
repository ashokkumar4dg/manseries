<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Routine | Man Series</title>
  <link rel="icon" type="image/png" href="Product Images/fav icon/favicon.png?v=2">
  <link rel="stylesheet" href="style.css?v=1780760796">
  <style>
    .cart-page-wrapper {
      padding: 10rem 0 6rem;
      min-height: 85vh;
      background: var(--cream);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .cart-page-card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(28px) saturate(1.3);
      -webkit-backdrop-filter: blur(28px) saturate(1.3);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 28px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.04);
      width: 100%;
      max-width: 550px;
      display: flex;
      flex-direction: column;
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @media (max-width: 600px) {
      .cart-page-wrapper {
        padding: 6rem 0 3rem;
      }
      .cart-page-card {
        border-radius: 0;
        border: none;
        box-shadow: none;
        background: transparent;
      }
    }
  </style>
</head>

<body>
  <!-- Navigation -->
  <header class="navbar navbar-light-page" id="navbar">
    <div class="container navbar-container">
      <div class="nav-brand">
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open Menu">
          <svg class="icon-menu" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
          <svg class="icon-close" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
        <a href="index.html" class="logo" aria-label="Man Series Home">
          <img src="Product Images/Logo/Wordmark Logo.png" alt="Man Series" class="logo-img">
        </a>
      </div>
      <nav class="nav-menu" id="navMenu">
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="series.html">Series</a></li>
          <li><a href="byos.html">B.Y.O.S.</a></li>
          <li><a href="about.html">About</a></li>
        </ul>
      </nav>
      <div class="nav-actions">
        <a href="account.html" class="account-trigger" aria-label="My Account" style="margin-right: 5px;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </a>
        <button class="cart-trigger" id="cartTrigger" aria-label="Open Cart" style="display:none;"></button>
        <a href="series.html" class="btn btn-primary hide-on-mobile" style="padding: 0.55rem 1.3rem; font-size: 0.8rem;">Shop Now</a>
      </div>
    </div>
  </header>

  <main class="cart-page-wrapper">
    <div class="container" style="max-width: 600px; padding: 2rem 1.5rem;">
      <div class="cart-page-card">
        
        <!-- Header -->
        <div class="cart-drawer-header">
          <h3>Your Routine</h3>
          <a href="series.html" class="close-cart-btn" style="text-decoration: none;">&times;</a>
        </div>

        <!-- Shipping Progress -->
        <div class="shipping-progress">
          <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:6px;">
            <span id="shippingMessage">Add items for free shipping</span>
            <span id="shippingPercent" style="font-weight:600;">0%</span>
          </div>
          <div class="shipping-bar-bg">
            <div class="shipping-fill" id="shippingFill" style="width: 0%"></div>
          </div>
        </div>

        <!-- Items Container -->
        <div class="cart-items-container" id="cartItemsContainer" style="max-height: 480px; overflow-y: auto;">
          <!-- Injected dynamically by app.js -->
        </div>

        <!-- Footer -->
        <div class="cart-drawer-footer">
          <!-- Coupon Box -->
          <div class="drawer-coupon-box">
            <input type="text" placeholder="Type coupon code here" />
            <button>Apply</button>
          </div>
          <!-- Subtotal Row -->
          <div class="cart-total-row">
            <span>Subtotal</span>
            <span id="cartTotalValue">₹0</span>
          </div>
          <!-- Checkout Button -->
          <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
          <!-- Continue Button -->
          <button class="continue-btn" id="continueShoppingBtn" onclick="window.location.href='series.html'">Continue Shopping</button>
        </div>

      </div>
    </div>
  </main>

  <script src="app.js?v=1780760815"></script>
</body>
</html>
